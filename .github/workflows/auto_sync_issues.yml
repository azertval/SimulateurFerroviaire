name: Close linked issues on PR merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Close linked issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || "";
            const targetBranch = context.payload.pull_request.base.ref;

            // Extrait les numéros d'issues depuis les mots-clés standards
            const regex = /(?:closes?|fixes?|resolves?)\s+#(\d+)/gi;
            const matches = [...prBody.matchAll(regex)];

            if (matches.length === 0) {
              console.log("No linked issues found in PR body.");
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1]);

              console.log(`Closing issue #${issueNumber} (PR merged into ${targetBranch})`);

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: "closed"
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `Closed automatically by merge of PR #${context.payload.pull_request.number} into \`${targetBranch}\`.`
              });
            }