name: Build (CMake)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [Release]

    steps:
    # -------------------------------------------------------------------------
    # Checkout (full history required for the release branch push)
    # -------------------------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # -------------------------------------------------------------------------
    # Setup CMake
    # -------------------------------------------------------------------------
    - name: Setup CMake
      uses: lukka/get-cmake@latest

    # -------------------------------------------------------------------------
    # Cache WebView2
    # -------------------------------------------------------------------------
    - name: Cache WebView2
      id: cache-webview2
      uses: actions/cache@v4
      with:
        path: External/WebView2
        key: webview2-cache-v1

    # -------------------------------------------------------------------------
    # Download WebView2 (if not cached)
    # -------------------------------------------------------------------------
    - name: Download WebView2
      if: steps.cache-webview2.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Write-Host "Downloading WebView2..."

        Invoke-WebRequest `
          -Uri https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2 `
          -OutFile webview2.zip

        Expand-Archive webview2.zip -DestinationPath webview2 -Force

        New-Item -ItemType Directory -Force -Path External/WebView2/include | Out-Null
        New-Item -ItemType Directory -Force -Path External/WebView2/lib/x64 | Out-Null

        Copy-Item webview2/build/native/include/WebView2.h External/WebView2/include/
        Copy-Item webview2/build/native/x64/WebView2LoaderStatic.lib External/WebView2/lib/x64/

        Write-Host "WebView2 installed"

    # -------------------------------------------------------------------------
    # Verify WebView2
    # -------------------------------------------------------------------------
    - name: Verify WebView2
      shell: powershell
      run: |
        if (!(Test-Path "External/WebView2/include/WebView2.h")) {
          Write-Error "WebView2.h not found"
          exit 1
        }

        if (!(Test-Path "External/WebView2/lib/x64/WebView2LoaderStatic.lib")) {
          Write-Error "WebView2LoaderStatic.lib not found"
          exit 1
        }

        Write-Host "WebView2 OK"

    # -------------------------------------------------------------------------
    # Configure
    # -------------------------------------------------------------------------
    - name: Configure
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    # -------------------------------------------------------------------------
    # Build
    # -------------------------------------------------------------------------
    - name: Build
      run: cmake --build build --config ${{ matrix.config }}

    # -------------------------------------------------------------------------
    # Upload artifact (toujours disponible, y compris sur les PR)
    # -------------------------------------------------------------------------
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: SimulateurFerroviaire-${{ matrix.config }}
        path: |
          build/${{ matrix.config }}/SimulateurFerroviaire.exe
          build/${{ matrix.config }}/Resources/

    # -------------------------------------------------------------------------
    # Push du dossier de sortie sur la branche `release`
    # Uniquement sur push vers master (pas sur PR)
    # -------------------------------------------------------------------------
    - name: Publish to release branch
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: powershell
      run: |
        # --- Préparer le dossier de sortie à publier ---
        $outDir = "build/${{ matrix.config }}"

        # --- Configurer git ---
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # --- Basculer sur la branche release (orpheline si elle n'existe pas) ---
        $branchExists = git ls-remote --heads origin release
        if ($branchExists) {
            git fetch origin release
            git checkout release
        } else {
            Write-Host "Creating orphan branch 'release'..."
            git checkout --orphan release
            git rm -rf . | Out-Null
        }

        # --- Copier l'exe ---
        Copy-Item "$outDir/SimulateurFerroviaire.exe" "SimulateurFerroviaire.exe" -Force

        # --- Copier les ressources si elles existent ---
        if (Test-Path "$outDir/Resources") {
            if (Test-Path "Resources") { Remove-Item "Resources" -Recurse -Force }
            Copy-Item "$outDir/Resources" "Resources" -Recurse -Force
        }

        # --- Commit et push ---
        $sha = "${{ github.sha }}".Substring(0, 7)
        $msg = "release: build from $sha"

        git add SimulateurFerroviaire.exe
        if (Test-Path "Resources") { git add Resources/ }

        $status = git status --porcelain
        if ($status) {
            git commit -m $msg
            git push origin release --force-with-lease
            Write-Host "Pushed to release branch"
        } else {
            Write-Host "Nothing changed - skipping push"
        }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
