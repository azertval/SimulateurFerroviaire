name: Build PR (CMake)

on:
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup CMake
      uses: lukka/get-cmake@latest

    - name: Configure
      run: 
        curl -L -o webview2.zip https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2
        powershell -Command "Expand-Archive webview2.zip -DestinationPath webview2"
        mkdir External\WebView2\include
        mkdir External\WebView2\lib\x64
        copy webview2\build\native\include\WebView2.h External\WebView2\include\
        copy webview2\build\native\x64\WebView2LoaderStatic.lib External\WebView2\lib\x64\
        cmake -B build -G "Visual Studio 17 2022" -A x64

    - name: Build
      run: cmake --build build --config Release
