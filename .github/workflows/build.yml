name: Build (CMake)

on:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        config: [Debug, Release]

    steps:
    # -------------------------------------------------------------------------
    # Checkout
    # -------------------------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v4

    # -------------------------------------------------------------------------
    # Setup CMake
    # -------------------------------------------------------------------------
    - name: Setup CMake
      uses: lukka/get-cmake@latest

    # -------------------------------------------------------------------------
    # Cache WebView2
    # -------------------------------------------------------------------------
    - name: Cache WebView2
      id: cache-webview2
      uses: actions/cache@v4
      with:
        path: External/WebView2
        key: webview2-cache-v1

    # -------------------------------------------------------------------------
    # Download WebView2 (if not cached)
    # -------------------------------------------------------------------------
    - name: Download WebView2
      if: steps.cache-webview2.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Write-Host "Downloading WebView2..."

        Invoke-WebRequest `
          -Uri https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2 `
          -OutFile webview2.zip

        Expand-Archive webview2.zip -DestinationPath webview2 -Force

        New-Item -ItemType Directory -Force -Path External/WebView2/include | Out-Null
        New-Item -ItemType Directory -Force -Path External/WebView2/lib/x64 | Out-Null

        Copy-Item webview2/build/native/include/WebView2.h External/WebView2/include/
        Copy-Item webview2/build/native/x64/WebView2LoaderStatic.lib External/WebView2/lib/x64/

        Write-Host "WebView2 installed"

    # -------------------------------------------------------------------------
    # Verify files (debug step)
    # -------------------------------------------------------------------------
    - name: Verify WebView2
      shell: powershell
      run: |
        if (!(Test-Path "External/WebView2/include/WebView2.h")) {
          Write-Error "WebView2.h not found"
          exit 1
        }

        if (!(Test-Path "External/WebView2/lib/x64/WebView2LoaderStatic.lib")) {
          Write-Error "WebView2LoaderStatic.lib not found"
          exit 1
        }

        Write-Host "WebView2 OK"

    # -------------------------------------------------------------------------
    # Configure
    # -------------------------------------------------------------------------
    - name: Configure
      run: cmake -B build -G "Visual Studio 17 2022" -A x64

    # -------------------------------------------------------------------------
    # Build
    # -------------------------------------------------------------------------
    - name: Build
      run: cmake --build build --config ${{ matrix.config }}

    # -------------------------------------------------------------------------
    # Upload artifact
    # -------------------------------------------------------------------------
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: SimulateurFerroviaire-${{ matrix.config }}
        path: |
          build/${{ matrix.config }}/SimulateurFerroviaire.exe